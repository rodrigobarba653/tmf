<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="loc-ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4fc" />
      <stop offset="100%" stop-color="#d4e8f5" />
    </linearGradient>
    <linearGradient id="loc-land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>
  <rect width="500" height="520" fill="url(#loc-ocean)" />
  <!-- Simplified contiguous U.S. + Alaska inset hint (decorative, not survey-accurate) -->
  <path
    fill="url(#loc-land)"
    stroke="#94a3b8"
